<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>合成大旅店</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="matter.min.js"></script>
  <script src="assets-manifest.js"></script>
  <script src="shop-quiz.js"></script>
</head>
<body>
  <div id="bg-layer"></div>
  <audio id="bgm-audio" loop preload="auto" playsinline></audio>

  <header class="top-bar">
    <div class="score-box">
      <span class="label">得分</span>
      <span id="score">0</span>
    </div>
    <div class="score-box best">
      <span class="label">最高</span>
      <span id="best-score">0</span>
    </div>
    <button type="button" id="btn-revive-hint" class="icon-btn revive-hint" title="答题复活（游戏结束时可用）">📖</button>
  </header>

  <main class="game-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="next-preview">
      <span class="preview-label">下一个</span>
      <canvas id="preview-canvas" width="56" height="56"></canvas>
    </div>
  </main>

  <p class="hint">移动鼠标 / 手指左右定位，点击或松手投放</p>

  <!-- 游戏结束 -->
  <div id="overlay-gameover" class="overlay hidden">
    <div class="modal">
      <h2>游戏结束</h2>
      <p class="gameover-slogan" id="gameover-slogan"></p>
      <p>得分：<strong id="final-score">0</strong></p>
      <p class="revive-tip">答对店学小知识可清除下方 1/3 小球并继续（每局最多 <span id="revives-left">5</span> 次，题目不重复）</p>
      <div class="gameover-actions">
        <button type="button" id="btn-revive" class="btn primary">答题复活</button>
        <button type="button" id="btn-restart" class="btn">再来一局</button>
      </div>
    </div>
  </div>

  <!-- 复活答题 -->
  <div id="overlay-quiz" class="overlay hidden">
    <div class="modal quiz-modal">
      <h2>复活题 · 店学小知识</h2>
      <p class="quiz-stem" id="quiz-question"></p>
      <p class="quiz-desc">请选择正确答案</p>
      <div id="quiz-options" class="quiz-options"></div>
      <p id="quiz-feedback" class="quiz-feedback"></p>
      <button type="button" id="btn-quiz-cancel" class="btn small">放弃复活</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
